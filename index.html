<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="纯前端图片压缩工具，图片不上传服务器，安全又快速">
  <title>PixelShrink · 图片压缩</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="header">
    <div class="header__brand">
      <span class="header__logo" aria-hidden="true">◐</span>
      <div>
        <h1 class="header__title">PixelShrink</h1>
        <p class="header__tagline">纯前端压缩 · 图片永不上传</p>
      </div>
    </div>
    <a class="header__github" href="https://github.com/xqnode/image-compressor" target="_blank" rel="noopener noreferrer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      GitHub
    </a>
  </header>

  <main class="main">
    <!-- 上传区域：透明 file input 覆盖全区域，确保点击一定能唤起文件选择 -->
    <label class="upload-zone" id="uploadZone">
      <input
        type="file"
        id="fileInput"
        class="upload-zone__input"
        accept="image/jpeg,image/png,image/webp,image/gif,.jpg,.jpeg,.png,.webp,.gif"
      >
      <div class="upload-zone__inner">
        <div class="upload-zone__icon" aria-hidden="true">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect x="6" y="10" width="36" height="28" rx="4" stroke="currentColor" stroke-width="2"/>
            <circle cx="17" cy="21" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M6 32l10-8 8 6 6-5 12 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="upload-zone__title">拖拽图片到这里，或点击选择</p>
        <p class="upload-zone__hint">支持 JPG · PNG · WebP · GIF · 单张最大 50MB</p>
      </div>
    </label>

    <!-- 工作台：压缩完成后显示 -->
    <section class="workspace hidden" id="workspace">
      <div class="workspace__preview">
        <div class="compare" id="compareContainer">
          <img class="compare__img compare__img--after" id="afterImage" alt="压缩后">
          <div class="compare__before" id="compareBefore">
            <img class="compare__img compare__img--before" id="beforeImage" alt="原图">
          </div>
          <div class="compare__slider" id="compareSlider">
            <div class="compare__handle">
              <span aria-hidden="true">⟷</span>
            </div>
          </div>
          <div class="compare__labels">
            <span>原图</span>
            <span>压缩后</span>
          </div>
        </div>
      </div>

      <aside class="workspace__panel">
        <div class="stats">
          <div class="stats__item">
            <span class="stats__label">原始大小</span>
            <span class="stats__value" id="originalSize">—</span>
          </div>
          <div class="stats__item stats__item--highlight">
            <span class="stats__label">压缩后</span>
            <span class="stats__value" id="compressedSize">—</span>
          </div>
          <div class="stats__item">
            <span class="stats__label">节省</span>
            <span class="stats__value stats__value--saved" id="savedPercent">—</span>
          </div>
        </div>

        <div class="control">
          <label class="control__label" for="qualitySlider">
            压缩质量
            <span class="control__value" id="qualityValue">80</span>
          </label>
          <input type="range" id="qualitySlider" min="10" max="100" value="80" step="1">
        </div>

        <div class="control">
          <label class="control__label" for="maxWidthSlider">
            最大宽度
            <span class="control__value" id="maxWidthValue">1920 px</span>
          </label>
          <input type="range" id="maxWidthSlider" min="480" max="3840" value="1920" step="160">
        </div>

        <div class="control">
          <span class="control__label">输出格式</span>
          <div class="format-btns" role="group" aria-label="输出格式">
            <button type="button" class="format-btn format-btn--active" data-format="image/jpeg">JPEG</button>
            <button type="button" class="format-btn" data-format="image/webp">WebP</button>
            <button type="button" class="format-btn" data-format="image/png">PNG</button>
          </div>
        </div>

        <div class="actions">
          <button type="button" class="btn btn--primary" id="downloadBtn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M8 2v8M8 10l3-3M8 10L5 7M3 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            下载压缩图
          </button>
          <button type="button" class="btn btn--ghost" id="resetBtn">换一张</button>
        </div>

        <p class="panel-note">所有处理在浏览器本地完成，不会上传到任何服务器。</p>
      </aside>
    </section>
  </main>

  <footer class="footer">
    <p>开源项目 · 带粉丝一起做 · 部署在 GitHub Pages</p>
  </footer>

  <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>

  <script src="js/compressor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
